# Quran Shield - Fly.io configuration
app = "quran-shield"
primary_region = "sea"  # Seattle - change to your preferred region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  LOG_LEVEL = "INFO"
  DEBUG = "False"
  MAX_FILE_SIZE_MB = "50"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Persistent storage for FFmpeg binaries
[mounts]
  source = "ffmpeg_cache"
  destination = "/app/backend/bin/ffmpeg"
