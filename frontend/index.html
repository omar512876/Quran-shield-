<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Quran Shield - Detect music vs. Quran recitation in audio files" />
  <title>Quran Shield – Audio Analyzer</title>

  <style>
    /* === RESET & BASE === */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* === MAIN CONTAINER === */
    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 650px;
      padding: 2.5rem;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* === HEADER === */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #718096;
    }

    /* === FORM SECTIONS === */
    .input-section {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #4a5568;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 0.75rem;
      border: 2px dashed #cbd5e0;
      border-radius: 8px;
      background: #f7fafc;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    input[type="file"]:hover {
      border-color: #4299e1;
      background: #ebf8ff;
    }

    input[type="file"]:focus {
      outline: none;
      border-color: #3182ce;
      box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
    }

    input[type="url"] {
      display: block;
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    input[type="url"]:focus {
      outline: none;
      border-color: #3182ce;
      box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
    }

    /* === DIVIDER === */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: #a0aec0;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
    }

    /* === BUTTON === */
    .btn {
      display: block;
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #cbd5e0;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* === LOADING SPINNER === */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === RESULT AREA === */
    #result {
      margin-top: 2rem;
    }

    /* === ERROR BOX === */
    .error-box {
      background: #fff5f5;
      border-left: 4px solid #fc8181;
      color: #c53030;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.9rem;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* === SUCCESS BOX === */
    .result-card {
      background: linear-gradient(135deg, #f0fff4 0%, #c6f6d5 100%);
      border: 2px solid #9ae6b4;
      border-radius: 12px;
      padding: 1.5rem;
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .prediction-badge {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-music {
      background: linear-gradient(135deg, #fbb6ce 0%, #ed64a6 100%);
      color: #742a2a;
    }

    .badge-speech {
      background: linear-gradient(135deg, #9ae6b4 0%, #48bb78 100%);
      color: #22543d;
    }

    /* === DETAILS TABLE === */
    .details-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .details-table td {
      padding: 0.6rem 0.5rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .details-table tr:last-child td {
      border-bottom: none;
    }

    .details-table td:first-child {
      font-weight: 600;
      color: #4a5568;
      width: 45%;
    }

    .details-table td:last-child {
      color: #2d3748;
      font-weight: 500;
    }

    /* === COLLAPSIBLE JSON === */
    details {
      margin-top: 1rem;
      cursor: pointer;
    }

    summary {
      font-size: 0.85rem;
      color: #718096;
      font-weight: 600;
      user-select: none;
      padding: 0.5rem;
      border-radius: 6px;
      transition: background 0.2s;
    }

    summary:hover {
      background: rgba(0, 0, 0, 0.05);
      color: #4a5568;
    }

    pre {
      background: #2d3748;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.8rem;
      overflow-x: auto;
      margin-top: 0.5rem;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      .container {
        padding: 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <h1>🛡️ Quran Shield</h1>
      <p class="subtitle">AI-powered audio analysis to detect music vs. Quran recitation</p>
    </div>

    <!-- FILE UPLOAD -->
    <div class="input-section">
      <label for="audioFile">📁 Upload Audio File</label>
      <input
        type="file"
        id="audioFile"
        accept="audio/*,video/*"
        aria-label="Upload audio file"
      />
    </div>

    <!-- DIVIDER -->
    <div class="divider">OR</div>

    <!-- URL INPUT -->
    <div class="input-section">
      <label for="youtubeUrl">🔗 YouTube / Audio URL</label>
      <input
        type="url"
        id="youtubeUrl"
        placeholder="https://www.youtube.com/watch?v=..."
        aria-label="YouTube or audio URL"
      />
    </div>

    <!-- ANALYZE BUTTON -->
    <button id="analyzeBtn" class="btn" type="button">
      🔍 Analyze Audio
    </button>

    <!-- RESULT AREA -->
    <div id="result" role="region" aria-live="polite"></div>
  </div>

  <!-- ============================================ -->
  <!-- JAVASCRIPT -->
  <!-- ============================================ -->
  <script>
    const API_URL = "/api/analyze";
    const fileInput = document.getElementById("audioFile");
    const urlInput = document.getElementById("youtubeUrl");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const resultArea = document.getElementById("result");

    // Helper: Escape HTML to prevent XSS
    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // Helper: Show error message
    function showError(message) {
      resultArea.innerHTML = `
        <div class="error-box">
          ⚠️ <strong>Error:</strong> ${escapeHtml(message)}
        </div>
      `;
    }

    // Helper: Render success result
    function showResult(data) {
      const badgeClass = data.prediction === "music" ? "badge-music" : "badge-speech";
      const predictionEmoji = data.prediction === "music" ? "🎵" : "📿";
      const predictionText = data.prediction === "music" ? "Music Detected" : "Safe (Quran/Speech)";

      let detailRows = "";
      
      // Confidence
      if (data.confidence !== undefined) {
        const pct = (data.confidence * 100).toFixed(1);
        detailRows += `
          <tr>
            <td>🎯 Confidence</td>
            <td><strong>${pct}%</strong></td>
          </tr>`;
      }

      // Key features
      if (data.features) {
        const { spectral_centroid, tempo, chroma_std } = data.features;
        if (spectral_centroid) {
          detailRows += `
            <tr>
              <td>🎼 Spectral Centroid</td>
              <td>${spectral_centroid.toFixed(1)} Hz</td>
            </tr>`;
        }
        if (tempo) {
          detailRows += `
            <tr>
              <td>⏱️ Tempo</td>
              <td>${tempo.toFixed(1)} BPM</td>
            </tr>`;
        }
        if (chroma_std) {
          detailRows += `
            <tr>
              <td>🎹 Harmonic Variation</td>
              <td>${chroma_std.toFixed(4)}</td>
            </tr>`;
        }
      }

      // Source info
      if (data.filename) {
        detailRows += `
          <tr>
            <td>📄 File</td>
            <td style="word-break:break-all;">${escapeHtml(data.filename)}</td>
          </tr>`;
      }
      if (data.url) {
        detailRows += `
          <tr>
            <td>🔗 URL</td>
            <td style="word-break:break-all;">${escapeHtml(data.url)}</td>
          </tr>`;
      }

      const rawJson = JSON.stringify(data, null, 2);

      resultArea.innerHTML = `
        <div class="result-card">
          <div>
            <span class="prediction-badge ${badgeClass}">
              ${predictionEmoji} ${predictionText}
            </span>
          </div>

          <table class="details-table">
            <tbody>${detailRows}</tbody>
          </table>

          <details>
            <summary>📊 Show Full JSON Response</summary>
            <pre>${escapeHtml(rawJson)}</pre>
          </details>
        </div>
      `;
    }

    // Main: Analyze button click handler
    analyzeBtn.addEventListener("click", async () => {
      resultArea.innerHTML = "";

      const file = fileInput.files[0];
      const url = urlInput.value.trim();

      if (!file && !url) {
        showError("Please upload a file or enter a URL before clicking Analyze.");
        return;
      }

      // Show loading state
      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '<span class="spinner"></span>Analyzing...';

      try {
        const formData = new FormData();
        if (file) {
          formData.append("file", file);
        } else {
          formData.append("url", url);
        }

        const response = await fetch(API_URL, {
          method: "POST",
          body: formData,
        });

        let data;
        try {
          data = await response.json();
        } catch {
          showError(`Server returned an unexpected response (HTTP ${response.status}).`);
          return;
        }

        if (!response.ok) {
          const msg = data.detail || data.error || `HTTP error ${response.status}`;
          showError(msg);
          return;
        }

        showResult(data);

      } catch (err) {
        console.error("Fetch error:", err);
        showError(
          "Could not reach the backend. Make sure the server is running and accessible."
        );
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.innerHTML = "🔍 Analyze Audio";
      }
    });

    // UX: Clear URL when file is selected (and vice-versa)
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        urlInput.value = "";
      }
    });

    urlInput.addEventListener("input", () => {
      if (urlInput.value.trim()) {
        fileInput.value = "";
      }
    });
  </script>
</body>
</html>
