<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quran Shield - Audio integrity analysis for Quran recitations">
  <title>Quran Shield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e6e0;
      --muted: #6b6962;
      --accent: #c9a96e;
      --safe: #4a7c59;
      --danger: #8b3a3a;
      --radius: 12px;
      --font: 'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Header */
    .header {
      margin-bottom: 32px;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: auto;
      flex-shrink: 0;
    }

    .health-dot.online { background: var(--safe); }
    .health-dot.offline { background: var(--danger); }

    /* Input Card */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
    }

    .tab {
      background: none;
      border: none;
      padding: 8px 0;
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Drop Zone */
    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
    }

    .drop-zone-text {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .drop-zone-hint {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 12px;
    }

    .file-input {
      display: none;
    }

    .file-name {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--accent);
    }

    /* URL Input */
    .url-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--text);
      transition: border-color 0.2s;
    }

    .url-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .url-input::placeholder {
      color: var(--muted);
    }

    /* Analyze Button */
    .analyze-btn {
      width: 100%;
      height: 48px;
      margin-top: 20px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 500;
      color: #0e0e0e;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .analyze-btn:hover:not(:disabled) {
      opacity: 0.88;
    }

    .analyze-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status Area */
    .status-area {
      display: none;
      margin-bottom: 32px;
    }

    .status-area.visible {
      display: block;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      width: 30%;
      background: var(--accent);
      animation: slide 1.5s ease-in-out infinite;
    }

    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .status-text {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Result Card */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      border-left: 3px solid var(--safe);
      opacity: 0;
      animation: fadeIn 0.2s ease forwards;
      display: none;
    }

    .result-card.visible {
      display: block;
    }

    .result-card.suspicious {
      border-left-color: var(--danger);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .verdict-badge {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .verdict-badge.safe { color: var(--safe); }
    .verdict-badge.suspicious { color: var(--danger); }

    .confidence {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .summary {
      font-size: 0.9375rem;
      color: var(--text);
      margin-top: 12px;
    }

    .duration {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Segments */
    .segments-section {
      margin-top: 20px;
    }

    .segments-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .segment-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .segment-row:last-child {
      border-bottom: none;
    }

    .segment-time {
      font-family: monospace;
      font-size: 0.875rem;
      color: var(--text);
    }

    .segment-label {
      background: rgba(139, 58, 58, 0.15);
      color: var(--danger);
      font-size: 0.6875rem;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .segment-score {
      font-size: 0.8125rem;
      color: var(--muted);
    }

    /* Technical Details */
    .details-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      padding: 8px 0;
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 0.8125rem;
      color: var(--muted);
      cursor: pointer;
      width: 100%;
      text-align: left;
    }

    .details-toggle:hover {
      color: var(--text);
    }

    .details-arrow {
      transition: transform 0.2s;
      font-size: 0.75rem;
    }

    .details-toggle.expanded .details-arrow {
      transform: rotate(90deg);
    }

    .details-content {
      display: none;
      margin-top: 12px;
    }

    .details-content.visible {
      display: block;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.8125rem;
    }

    .detail-key {
      color: var(--muted);
    }

    .detail-value {
      color: var(--text);
      font-family: monospace;
    }

    /* Error Area */
    .error-area {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      margin-bottom: 32px;
    }

    .error-area.visible {
      display: flex;
    }

    .error-x {
      color: var(--danger);
      font-weight: 500;
    }

    .error-message {
      color: var(--text);
    }

    @media (max-width: 480px) {
      .page {
        padding: 24px 16px;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .input-card {
        padding: 20px;
      }

      .segment-row {
        flex-wrap: wrap;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="header-row">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 4 A10 10 0 1 0 14 24 A7 7 0 1 1 14 4Z" fill="#c9a96e"/>
          <polygon points="21,6 21.9,8.6 24.6,8.6 22.5,10.2 23.3,12.9 21,11.3 18.7,12.9 19.5,10.2 17.4,8.6 20.1,8.6" fill="#c9a96e"/>
        </svg>
        <h1>Quran Shield</h1>
        <div class="health-dot" id="healthDot" title="Backend status"></div>
      </div>
      <p class="subtitle">Audio integrity analysis for Quran recitations</p>
    </header>

    <!-- Input Card -->
    <div class="input-card">
      <div class="tabs">
        <button class="tab active" data-tab="upload">Upload Audio</button>
        <button class="tab" data-tab="url">YouTube URL</button>
      </div>

      <div class="tab-content active" id="upload-tab">
        <div class="drop-zone" id="dropZone">
          <p class="drop-zone-text">Drop audio file here or click to browse</p>
          <p class="drop-zone-hint">MP3, WAV, OGG, M4A, FLAC — max 50 MB</p>
          <p class="file-name" id="fileName"></p>
        </div>
        <input type="file" class="file-input" id="fileInput" accept="audio/*,video/*">
      </div>

      <div class="tab-content" id="url-tab">
        <input type="url" class="url-input" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
      </div>

      <button class="analyze-btn" id="analyzeBtn">Analyze Audio</button>
    </div>

    <!-- Status Area -->
    <div class="status-area" id="statusArea">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <p class="status-text" id="statusText">Uploading…</p>
    </div>

    <!-- Error Area -->
    <div class="error-area" id="errorArea">
      <span class="error-x">×</span>
      <span class="error-message" id="errorMessage"></span>
    </div>

    <!-- Result Card -->
    <div class="result-card" id="resultCard">
      <div class="result-top">
        <span class="verdict-badge" id="verdictBadge">SAFE</span>
        <span class="confidence" id="confidenceText"></span>
      </div>
      <p class="summary" id="summaryText"></p>
      <p class="duration" id="durationText"></p>

      <div class="segments-section" id="segmentsSection" style="display: none;">
        <p class="segments-label">Suspicious segments</p>
        <div id="segmentsList"></div>
      </div>

      <button class="details-toggle" id="detailsToggle">
        <span class="details-arrow">›</span>
        Technical details
      </button>
      <div class="details-content" id="detailsContent">
        <div class="detail-row">
          <span class="detail-key">Spectral Centroid Mean</span>
          <span class="detail-value" id="featureCentroid">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">ZCR Mean</span>
          <span class="detail-value" id="featureZcr">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-key">RMS Mean</span>
          <span class="detail-value" id="featureRms">—</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // API Configuration
    const API_BASE = window.BACKEND_URL || '';
    const API_URL = `${API_BASE}/api/analyze`;
    const RESULT_URL = `${API_BASE}/api/result`;
    const HEALTH_URL = `${API_BASE}/health`;

    // DOM Elements
    const healthDot = document.getElementById('healthDot');
    const tabs = document.querySelectorAll('.tab');
    const tabContents = {
      upload: document.getElementById('upload-tab'),
      url: document.getElementById('url-tab')
    };
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const urlInput = document.getElementById('urlInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const statusArea = document.getElementById('statusArea');
    const statusText = document.getElementById('statusText');
    const errorArea = document.getElementById('errorArea');
    const errorMessage = document.getElementById('errorMessage');
    const resultCard = document.getElementById('resultCard');
    const verdictBadge = document.getElementById('verdictBadge');
    const confidenceText = document.getElementById('confidenceText');
    const summaryText = document.getElementById('summaryText');
    const durationText = document.getElementById('durationText');
    const segmentsSection = document.getElementById('segmentsSection');
    const segmentsList = document.getElementById('segmentsList');
    const detailsToggle = document.getElementById('detailsToggle');
    const detailsContent = document.getElementById('detailsContent');
    const featureCentroid = document.getElementById('featureCentroid');
    const featureZcr = document.getElementById('featureZcr');
    const featureRms = document.getElementById('featureRms');

    let selectedFile = null;
    let currentTab = 'upload';

    // Health Check
    async function checkHealth() {
      try {
        const response = await fetch(HEALTH_URL);
        if (response.ok) {
          healthDot.classList.add('online');
          healthDot.classList.remove('offline');
        } else {
          healthDot.classList.add('offline');
          healthDot.classList.remove('online');
        }
      } catch {
        healthDot.classList.add('offline');
        healthDot.classList.remove('online');
      }
    }

    // Tab Switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        Object.keys(tabContents).forEach(key => {
          tabContents[key].classList.toggle('active', key === targetTab);
        });
        currentTab = targetTab;
      });
    });

    // Drop Zone
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        selectedFile = files[0];
        fileName.textContent = selectedFile.name;
        urlInput.value = '';
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        selectedFile = fileInput.files[0];
        fileName.textContent = selectedFile.name;
        urlInput.value = '';
      }
    });

    // URL Input
    urlInput.addEventListener('input', () => {
      if (urlInput.value.trim()) {
        selectedFile = null;
        fileInput.value = '';
        fileName.textContent = '';
      }
    });

    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        analyzeAudio();
      }
    });

    // Details Toggle
    detailsToggle.addEventListener('click', () => {
      detailsToggle.classList.toggle('expanded');
      detailsContent.classList.toggle('visible');
    });

    // Format duration
    function formatDuration(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Show/Hide helpers
    function showStatus(text) {
      statusText.textContent = text;
      statusArea.classList.add('visible');
      errorArea.classList.remove('visible');
      resultCard.classList.remove('visible');
    }

    function hideStatus() {
      statusArea.classList.remove('visible');
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      errorArea.classList.add('visible');
      hideStatus();
      resultCard.classList.remove('visible');
    }

    function showResult(data) {
      hideStatus();
      errorArea.classList.remove('visible');

      const isSuspicious = data.verdict === 'suspicious';
      resultCard.classList.toggle('suspicious', isSuspicious);
      
      verdictBadge.textContent = isSuspicious ? 'SUSPICIOUS' : 'SAFE';
      verdictBadge.className = 'verdict-badge ' + (isSuspicious ? 'suspicious' : 'safe');

      const conf = data.confidence !== undefined ? (data.confidence * 100).toFixed(1) + '%' : '';
      confidenceText.textContent = conf;

      summaryText.textContent = data.summary || '';
      durationText.textContent = data.duration !== undefined ? 'Duration: ' + formatDuration(data.duration) : '';

      // Segments
      if (isSuspicious && data.segments && data.segments.length > 0) {
        segmentsSection.style.display = 'block';
        segmentsList.innerHTML = '';
        data.segments.forEach(seg => {
          const row = document.createElement('div');
          row.className = 'segment-row';

          const time = document.createElement('span');
          time.className = 'segment-time';
          time.textContent = (seg.start_formatted || formatDuration(seg.start)) + ' → ' + (seg.end_formatted || formatDuration(seg.end));

          const label = document.createElement('span');
          label.className = 'segment-label';
          label.textContent = seg.label || 'unknown';

          const score = document.createElement('span');
          score.className = 'segment-score';
          score.textContent = seg.score !== undefined ? (seg.score * 100).toFixed(0) + '%' : '';

          row.appendChild(time);
          row.appendChild(label);
          row.appendChild(score);
          segmentsList.appendChild(row);
        });
      } else {
        segmentsSection.style.display = 'none';
      }

      // Features
      if (data.features) {
        featureCentroid.textContent = data.features.spectral_centroid_mean !== undefined 
          ? data.features.spectral_centroid_mean.toFixed(4) : '—';
        featureZcr.textContent = data.features.zcr_mean !== undefined 
          ? data.features.zcr_mean.toFixed(4) : '—';
        featureRms.textContent = data.features.rms_mean !== undefined 
          ? data.features.rms_mean.toFixed(4) : '—';
      }

      // Reset details
      detailsToggle.classList.remove('expanded');
      detailsContent.classList.remove('visible');

      resultCard.classList.add('visible');
    }

    // Poll for result
    async function pollResult(taskId) {
      const maxAttempts = 60;
      const interval = 1500;
      let attempts = 0;
      const statusMessages = ['Uploading…', 'Analyzing…', 'Processing…'];

      while (attempts < maxAttempts) {
        showStatus(statusMessages[Math.min(attempts, statusMessages.length - 1)]);

        try {
          const response = await fetch(`${RESULT_URL}/${taskId}`);
          const data = await response.json();

          if (response.status === 200 && data.status === 'done') {
            return data;
          } else if (response.status === 500 || data.status === 'error') {
            throw new Error(data.error || 'Analysis failed');
          } else if (response.status === 404) {
            throw new Error('Task not found');
          }
          // Still processing, continue polling
        } catch (err) {
          if (err.message !== 'Task not found' && !err.message.includes('Analysis failed')) {
            // Network error, keep trying
          } else {
            throw err;
          }
        }

        await new Promise(resolve => setTimeout(resolve, interval));
        attempts++;
      }

      throw new Error('Analysis timed out. Please try again.');
    }

    // Main analyze function
    async function analyzeAudio() {
      const url = urlInput.value.trim();

      if (!selectedFile && !url) {
        showError('Please upload a file or enter a URL.');
        return;
      }

      analyzeBtn.disabled = true;
      analyzeBtn.textContent = 'Analyzing…';
      showStatus('Uploading…');

      try {
        const formData = new FormData();
        if (selectedFile) {
          formData.append('file', selectedFile);
        } else {
          formData.append('url', url);
        }

        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || data.detail || `Error ${response.status}`);
        }

        // Handle async task pattern (202 response)
        if (response.status === 202 && data.task_id) {
          const result = await pollResult(data.task_id);
          showResult(result);
        } else {
          // Direct result (legacy)
          showResult(data);
        }

      } catch (err) {
        showError(err.message || 'An error occurred');
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = 'Analyze Audio';
      }
    }

    // Event listeners
    analyzeBtn.addEventListener('click', analyzeAudio);

    // Initialize
    checkHealth();
  </script>
</body>
</html>
